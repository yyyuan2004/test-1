<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaMirror - AI 人格镜像</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">
                    <span class="logo-icon">&#9674;</span>
                    PersonaMirror
                </h1>
                <button id="btn-new-chat" class="btn btn-primary" title="新建对话">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    新建对话
                </button>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-tab active" data-tab="chats">对话</button>
                <button class="nav-tab" data-tab="personas">人格</button>
                <button class="nav-tab" data-tab="settings">设置</button>
            </nav>

            <!-- Chat list -->
            <div id="panel-chats" class="sidebar-panel active">
                <div id="conversation-list" class="item-list">
                    <div class="empty-state">暂无对话记录</div>
                </div>
            </div>

            <!-- Persona list -->
            <div id="panel-personas" class="sidebar-panel">
                <div class="panel-actions">
                    <button id="btn-upload" class="btn btn-secondary btn-sm">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M8 2v8M4 6l4-4 4 4M2 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        上传聊天记录
                    </button>
                    <button id="btn-web-learn" class="btn btn-secondary btn-sm">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/>
                            <path d="M2 8h12M8 2c-2 2-2 10 0 12M8 2c2 2 2 10 0 12" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        从网页学习
                    </button>
                </div>
                <div id="persona-list" class="item-list">
                    <div class="empty-state">尚未创建人格。<br>上传聊天记录即可开始。</div>
                </div>
            </div>

            <!-- Settings panel -->
            <div id="panel-settings" class="sidebar-panel">
                <div class="settings-group">
                    <label class="setting-label">语言模型后端</label>
                    <select id="select-backend" class="setting-input">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic Claude</option>
                        <option value="deepseek">DeepSeek 深度求索</option>
                        <option value="qwen">通义千问 Qwen</option>
                        <option value="zhipu">智谱清言 GLM</option>
                        <option value="local">本地模型</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label class="setting-label">主题</label>
                    <select id="select-theme" class="setting-input">
                        <option value="dark">深色</option>
                        <option value="light">浅色</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label class="setting-label">模型信息</label>
                    <div id="model-info" class="setting-info">加载中...</div>
                </div>
                <div class="settings-group">
                    <button id="btn-test-backend" class="btn btn-secondary btn-sm" style="width:100%">测试当前后端连接</button>
                    <div id="test-result" class="upload-status hidden" style="margin-top:8px"></div>
                </div>
                <div class="settings-group">
                    <button id="btn-fetch-trends" class="btn btn-secondary btn-sm" style="width:100%">抓取热搜/流行语</button>
                    <div id="trend-result" class="upload-status hidden" style="margin-top:8px"></div>
                </div>
            </div>

            <!-- Status bar -->
            <div id="status-bar" class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">正在检测...</span>
            </div>
        </aside>

        <!-- Main chat area -->
        <main id="main">
            <!-- Welcome screen -->
            <div id="welcome-screen" class="welcome">
                <div class="welcome-content">
                    <div class="welcome-icon">&#9674;</div>
                    <h2>欢迎使用 PersonaMirror</h2>
                    <p>创建能够模仿真人说话风格的 AI 人格。</p>
                    <div class="welcome-steps">
                        <div class="step">
                            <div class="step-num">1</div>
                            <div class="step-text">上传聊天记录，创建一个人格</div>
                        </div>
                        <div class="step">
                            <div class="step-num">2</div>
                            <div class="step-text">选择一个人格，开始对话</div>
                        </div>
                        <div class="step">
                            <div class="step-num">3</div>
                            <div class="step-text">AI 将学习并模仿该人物的说话风格</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat view -->
            <div id="chat-view" class="chat-view hidden">
                <div id="chat-header" class="chat-header">
                    <div class="chat-title">
                        <span id="chat-persona-name">新对话</span>
                        <span id="chat-persona-badge" class="badge hidden">人格</span>
                    </div>
                </div>

                <div id="chat-messages" class="chat-messages">
                    <!-- Messages rendered here -->
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea
                            id="chat-input"
                            placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"
                            rows="1"
                        ></textarea>
                        <button id="btn-send" class="btn-send" title="发送">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M3 10l14-7-7 14v-7H3z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Upload modal -->
    <div id="modal-upload" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传聊天记录</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>人格名称</label>
                    <input type="text" id="upload-persona-name" placeholder="例如：我的朋友" class="setting-input">
                </div>
                <div class="form-group">
                    <label>目标说话人（要学习谁的风格）</label>
                    <input type="text" id="upload-target-speaker" placeholder="例如：小明" class="setting-input">
                </div>
                <div class="form-group">
                    <label>已有人格（可选，追加数据）</label>
                    <select id="upload-persona-select" class="setting-input">
                        <option value="">创建新人格</option>
                    </select>
                </div>
                <div class="upload-zone" id="upload-zone">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <path d="M20 6v20M12 14l8-8 8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6 26v4a4 4 0 004 4h20a4 4 0 004-4v-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <p>拖拽聊天记录文件到此处</p>
                    <p class="upload-hint">支持微信、WhatsApp 和纯文本格式</p>
                    <input type="file" id="upload-file" accept=".txt,.html,.htm,.csv" multiple hidden>
                    <button class="btn btn-secondary btn-sm" id="btn-browse">浏览文件</button>
                </div>
                <div id="upload-status" class="upload-status hidden"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-cancel">取消</button>
                <button class="btn btn-primary" id="btn-upload-submit" disabled>上传并分析</button>
            </div>
        </div>
    </div>

    <!-- Web Learn modal -->
    <div id="modal-web-learn" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>从网页学习</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>要学习的网页地址</label>
                    <input type="url" id="web-learn-url" placeholder="https://..." class="setting-input">
                </div>
                <div class="form-group">
                    <label>关联人格（可选）</label>
                    <select id="web-learn-persona-select" class="setting-input">
                        <option value="">不关联人格（通用知识）</option>
                    </select>
                </div>
                <div id="web-learn-status" class="upload-status hidden"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-cancel">取消</button>
                <button class="btn btn-primary" id="btn-web-learn-submit">开始学习</button>
            </div>
        </div>
    </div>

    <!-- Persona detail modal -->
    <div id="modal-persona-detail" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3 id="persona-detail-title">人格详情</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="persona-detail-body">
                <!-- Filled dynamically -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-cancel">关闭</button>
                <button class="btn btn-primary" id="btn-persona-save">保存修改</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/ingest.js"></script>
    <script src="/js/persona.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
